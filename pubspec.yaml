name: orushops
description: OruShops - Offline-first mobile POS system
publish_to: none

version: 1.0.0+2

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  go_router: ^14.0.0
  sqflite: ^2.3.0
  path: ^1.8.0
  shared_preferences: ^2.2.0
  mobile_scanner: ^5.0.0
  qr: ^3.0.0
  intl: ^0.19.0
  cupertino_icons: ^1.0.8
  connectivity_plus: ^5.0.0
  local_auth: ^2.1.0
  permission_handler: ^11.4.0
  crypto: ^3.0.7
  http: ^1.1.0
  flutter_svg: ^2.0.10
  image_picker: ^1.0.0
  path_provider: ^2.1.0
  qr_flutter: ^4.1.0
  share_plus: ^7.2.0
  url_launcher: ^6.2.0
  printing: ^5.11.0
  pdf: ^3.10.0
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.2
  firebase_crashlytics: ^4.1.1
  cloud_firestore: ^5.0.0
  google_sign_in: ^6.2.0
  purchases_flutter: ^10.0.0
  purchases_ui_flutter: ^10.0.0
  sign_in_with_apple: ^7.0.1
  fl_chart: ^0.71.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.0
  test: ^1.25.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "orushop.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - images/
